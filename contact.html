<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zarf Robotics — Contact</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" sizes="any" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020609;
    --bg2: #040d14;
    --panel: #060f18;
    --panel2: #081525;
    --border: #0a2a3f;
    --border2: #0d3a55;
    --cyan: #00d4ff;
    --cyan2: #00a8cc;
    --green: #00ff88;
    --orange: #ff6b2b;
    --text: #c8e8f5;
    --text2: #6a9ab5;
    --text3: #3a6a85;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* SCANLINES */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* GRID BG */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }
  .grid-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(0,60,100,0.4) 0%, transparent 65%);
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(2,6,9,0.88);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 2.5px;
    text-shadow: 0 0 18px rgba(0,212,255,0.45);
  }
  .logo-sub {
    font-size: 9px;
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1.5px;
    margin-top: 3px;
  }
  .back-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text2);
    text-decoration: none;
    padding: 7px 16px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    background: transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .back-btn:hover {
    color: var(--cyan);
    border-color: rgba(0,212,255,0.4);
    background: rgba(0,212,255,0.06);
  }

  /* MAIN */
  main {
    flex: 1;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 32px 60px;
  }

  /* EYEBROW */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .eyebrow-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .eyebrow-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 3px;
  }

  /* PHONE DISPLAY */
  .phone-display {
    position: relative;
    width: 100%;
    max-width: 680px;
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,212,255,0.08), 0 0 0 1px rgba(0,212,255,0.05);
  }

  /* animated top bar */
  .phone-display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--green), var(--cyan), transparent);
    background-size: 200% 100%;
    animation: scan 3s linear infinite;
  }
  @keyframes scan { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* terminal bar */
  .term-bar {
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; }
  .td-r { background: #ff5f57; }
  .td-y { background: #febc2e; }
  .td-g { background: #28c840; }
  .term-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 2px;
    flex: 1;
    text-align: center;
  }

  /* display body */
  .display-body {
    padding: 48px 48px 40px;
    text-align: center;
  }

  .signal-bars {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 5px;
    margin-bottom: 32px;
    height: 28px;
  }
  .bar {
    width: 8px;
    background: var(--cyan);
    border-radius: 2px;
    opacity: 0.3;
    animation: barPulse 1.4s ease-in-out infinite;
  }
  .bar:nth-child(1) { height: 8px;  animation-delay: 0s;    }
  .bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 20px; animation-delay: 0.3s;  }
  .bar:nth-child(4) { height: 26px; animation-delay: 0.45s; }
  .bar:nth-child(5) { height: 20px; animation-delay: 0.3s;  }
  .bar:nth-child(6) { height: 14px; animation-delay: 0.15s; }
  .bar:nth-child(7) { height: 8px;  animation-delay: 0s;    }
  @keyframes barPulse {
    0%,100% { opacity:0.3; }
    50% { opacity:1; box-shadow: 0 0 8px var(--cyan); }
  }

  .call-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 4px;
    margin-bottom: 16px;
  }

  .phone-number {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 5.5vw, 58px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(0,212,255,0.3);
    position: relative;
    display: block;
    white-space: nowrap;
    text-align: center;
  }

  /* digit glow effect on each character */
  .phone-number .d {
    display: inline-block;
    animation: digitGlow 3s ease-in-out infinite;
  }
  .phone-number .d:nth-child(1)  { animation-delay: 0.0s; }
  .phone-number .d:nth-child(2)  { animation-delay: 0.1s; }
  .phone-number .d:nth-child(3)  { animation-delay: 0.2s; }
  .phone-number .d:nth-child(4)  { animation-delay: 0.3s; }
  .phone-number .d:nth-child(5)  { animation-delay: 0.4s; }
  .phone-number .d:nth-child(6)  { animation-delay: 0.5s; }
  .phone-number .d:nth-child(7)  { animation-delay: 0.6s; }
  .phone-number .d:nth-child(8)  { animation-delay: 0.7s; }
  .phone-number .d:nth-child(9)  { animation-delay: 0.8s; }
  .phone-number .d:nth-child(10) { animation-delay: 0.9s; }
  .phone-number .sep { color: var(--text3); margin: 0 2px; }

  @keyframes digitGlow {
    0%,80%,100% { color: #fff; text-shadow: none; }
    40% { color: var(--cyan); text-shadow: 0 0 20px rgba(0,212,255,0.8), 0 0 40px rgba(0,212,255,0.4); }
  }

  .country-code {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-bottom: 36px;
  }
  .country-code span { color: var(--cyan); }

  /* call button */
  .btn-call {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 18px 40px;
    background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,255,136,0.05));
    border: 1px solid rgba(0,255,136,0.5);
    color: var(--green);
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .btn-call::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,255,136,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-call:hover {
    box-shadow: 0 0 40px rgba(0,255,136,0.25), inset 0 0 20px rgba(0,255,136,0.08);
    color: #fff;
    border-color: var(--green);
    transform: translateY(-2px);
  }
  .btn-call:hover::before { opacity: 1; }

  .call-icon {
    width: 22px; height: 22px;
    animation: ringRing 2s ease-in-out infinite;
  }
  @keyframes ringRing {
    0%,90%,100% { transform: rotate(0deg); }
    92% { transform: rotate(-15deg); }
    94% { transform: rotate(15deg); }
    96% { transform: rotate(-10deg); }
    98% { transform: rotate(10deg); }
  }

  /* info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    margin-top: 8px;
  }
  .info-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .info-card:hover {
    border-color: var(--border2);
    background: var(--panel2);
    transform: translateY(-1px);
  }
  .info-icon {
    font-size: 20px;
    flex-shrink: 0;
  }
  .info-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .info-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 1px;
  }
  .info-card.gh:hover .info-value { color: #fff; }
  .info-card.yt:hover .info-value { color: #ff4444; }

  /* corner decorations */
  .deco-corner {
    position: absolute;
    width: 16px; height: 16px;
  }
  .deco-corner.tl { top: 8px; left: 8px; border-top: 1px solid rgba(0,212,255,0.4); border-left: 1px solid rgba(0,212,255,0.4); }
  .deco-corner.tr { top: 8px; right: 8px; border-top: 1px solid rgba(0,212,255,0.4); border-right: 1px solid rgba(0,212,255,0.4); }
  .deco-corner.bl { bottom: 8px; left: 8px; border-bottom: 1px solid rgba(0,212,255,0.4); border-left: 1px solid rgba(0,212,255,0.4); }
  .deco-corner.br { bottom: 8px; right: 8px; border-bottom: 1px solid rgba(0,212,255,0.4); border-right: 1px solid rgba(0,212,255,0.4); }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 20px 32px;
    text-align: center;
  }
  .footer-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1.5px;
  }
  .footer-text span { color: var(--cyan); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 768px) {
    /* header */
    .header-inner { padding: 11px 16px; }
    .logo-text { font-size: 13px; letter-spacing: 1.5px; }
    .logo-sub { font-size: 8px; }
    .back-btn { padding: 6px 12px; font-size: 9px; }

    /* main */
    main { padding: 90px 16px 40px; }

    /* eyebrow */
    .eyebrow-text { font-size: 9px; letter-spacing: 2px; }

    /* phone display panel */
    .phone-display { border-radius: 12px; }
    .display-body { padding: 28px 20px 24px; }

    /* signal bars */
    .signal-bars { margin-bottom: 20px; height: 22px; }
    .bar { width: 6px; }
    .bar:nth-child(4) { height: 20px; }

    /* call label */
    .call-label { font-size: 9px; letter-spacing: 3px; margin-bottom: 12px; }

    /* phone number — full width, centred, no overflow */
    .phone-number {
      font-size: clamp(26px, 9vw, 42px);
      letter-spacing: 2px;
      word-break: break-all;
    }

    /* country code */
    .country-code { font-size: 11px; margin-bottom: 24px; }

    /* call button — full width */
    .btn-call {
      width: 100%;
      justify-content: center;
      padding: 16px 20px;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* info cards — stack vertically */
    .info-grid { grid-template-columns: 1fr; gap: 10px; }
    .info-card { padding: 14px 16px; }
    .info-label { font-size: 8px; }
    .info-value { font-size: 10px; }

    /* footer */
    footer { padding: 16px; }
  }

  @media (max-width: 380px) {
    .phone-number { font-size: 24px; letter-spacing: 1px; }
    .display-body { padding: 22px 14px 20px; }
  }
</style>
</head>
